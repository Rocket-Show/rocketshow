@if (!settings || !settings.remoteDeviceList || settings.remoteDeviceList.length == 0) {
  <i>{{ 'routing.remote-devices-hint'
  | translate }}</i>
}
@for (remoteDevice of settings?.remoteDeviceList; track remoteDevice; let i = $index) {
  <div [hidden]="!remoteDevice.name">
    <div class="form-check">
      <input type="checkbox" [ngModel]="remoteDeviceChecked(remoteDevice)" (ngModelChange)="updateRemoteDeviceSync(remoteDevice, $event)" class="form-check-input"
        id="remote_{{ uuid }}_{{ i }}">
      <label class="form-check-label" for="remote_{{ uuid }}_{{ i }}">
        {{ remoteDevice.name }}
      </label>
    </div>
  </div>
}
