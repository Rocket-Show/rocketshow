<div class="form-group row">
  <div class="col-md-12">
    <div
      class="list-group"
      [sortablejs]="action.lightingActionUniverseList"
      [sortablejsOptions]="{ onMove: sortMove }"
    >
      <div
        class="list-group-item"
        *ngFor="
          let lightingActionUniverse of action.lightingActionUniverseList;
          let i = index
        "
      >
        <div class="form-group row">
          <label class="col-md-3 col-form-label">{{
            "action.lighting.universe-name" | translate
          }}</label>
          <div class="col-md-9">
            <!-- Currently only one universe is allowed anyway -->
            <input
              disabled
              [(ngModel)]="lightingActionUniverse.universeName"
              [typeahead]="universeNameList"
              class="form-control"
            />
          </div>
        </div>
        <div class="form-group row">
          <label class="col-md-3 col-form-label">{{
            "action.lighting.channel-value" | translate
          }}</label>
          <div
            class="col-md-9"
            [sortablejs]="lightingActionUniverse.channelValueList"
            [sortablejsOptions]="{ onMove: sortMove }"
          >
            <div
              *ngFor="
                let channelValue of lightingActionUniverse.channelValueList;
                let i = index
              "
              class="form-group row"
            >
              <div class="col-md-1 d-flex">
                <div
                  class="flex-grow-1 list-sort-handle my-auto"
                  style="cursor: move; cursor: -webkit-grabbing"
                >
                  <i class="fa fa-bars" aria-hidden="true"></i>
                </div>
              </div>
              <div class="col-md-5">
                <select
                  class="custom-select"
                  [(ngModel)]="channelValue.channel"
                >
                  <option
                    *ngFor="let channel of channelList"
                    value="{{ channel }}"
                  >
                    {{ channel + 1 }}
                  </option>
                </select>
              </div>
              <div class="col-md-5">
                <select class="custom-select" [(ngModel)]="channelValue.value">
                  <option *ngFor="let value of valueList" value="{{ value }}">
                    {{ value }}
                  </option>
                </select>
              </div>
              <div class="col-md-1 d-flex pl-0">
                <a
                  class="my-auto text-danger"
                  href="#"
                  role="button"
                  (click)="deleteChannel(lightingActionUniverse, i); (false)"
                >
                  <i class="fa fa-trash-o" aria-hidden="true"></i>
                </a>
              </div>
            </div>
            <a
              href="#"
              (click)="addChannel(lightingActionUniverse); (false)"
              class="no-sortjs list-group-item text-center"
            >
              <i class="fa fa-plus" aria-hidden="true"></i>
              {{ "action.add" | translate }}
            </a>
          </div>
        </div>

        <!-- Move/delete -->
        <div class="form-group row">
          <div class="col-md-12 d-flex">
            <div
              class="flex-grow-1 list-sort-handle my-auto"
              style="cursor: move; cursor: -webkit-grabbing"
            >
              <i class="fa fa-bars" aria-hidden="true"></i>
            </div>
            <div class="ml-auto">
              <a
                class="mr-3 my-auto text-danger"
                href="#"
                role="button"
                (click)="deleteUniverse(i); (false)"
              >
                <i class="fa fa-trash-o" aria-hidden="true"></i>
                {{ "misc.delete" | translate }}
              </a>
            </div>
          </div>
        </div>
      </div>
      <a
        href="#"
        (click)="addUniverse(); (false)"
        class="no-sortjs list-group-item text-center"
      >
        <i class="fa fa-plus" aria-hidden="true"></i>
        {{ "action.add" | translate }}
      </a>
    </div>
  </div>
</div>
