<div class="form-group row">
  <label class="col-md-3 col-form-label">{{
    "action.http.method" | translate
  }}</label>
  <div class="col-md-9">
    <select class="custom-select" [(ngModel)]="action.httpMethod">
      @for (method of methodList; track method) {
        <option value="{{ method }}">
          {{ method }}
        </option>
      }
    </select>
  </div>
</div>

<div class="form-group row">
  <label class="col-md-3 col-form-label">{{
    "action.http.url" | translate
  }}</label>
  <div class="col-md-9">
    <input
      [(ngModel)]="action.url"
      placeholder="http://test.local"
      class="form-control"
      />
  </div>
</div>

<div class="form-group row">
  <label class="col-md-3 col-form-label">{{
    "action.http.body" | translate
  }}</label>
  <div class="col-md-9">
    <textarea [(ngModel)]="action.body" class="form-control"> </textarea>
  </div>
</div>

<div class="form-group row">
  <label class="col-md-3 col-form-label">{{
    "action.http.headers" | translate
  }}</label>
  <div
    class="col-md-9"
    [sortablejs]="headerEntries"
    [sortablejsOptions]="{ onMove: sortMove }"
    >
    @for (header of headerEntries; track header; let i = $index) {
      <div
        class="form-group row"
        >
        <div class="col-md-1 d-flex">
          <div
            class="flex-grow-1 list-sort-handle my-auto"
            style="cursor: move; cursor: -webkit-grabbing"
            >
            <i class="fa fa-bars" aria-hidden="true"></i>
          </div>
        </div>
        <div class="col-md-5">
          <input
            class="form-control"
            [(ngModel)]="header.key"
            (ngModelChange)="onEntryChange()"
            name="headerKey{{ i }}"
            />
        </div>
        <div class="col-md-5">
          <input
            class="form-control"
            [(ngModel)]="header.value"
            (ngModelChange)="onEntryChange()"
            name="headerValue{{ i }}"
            />
        </div>
        <div class="col-md-1 d-flex pl-0">
          <a
            class="my-auto text-danger"
            href="#"
            role="button"
            (click)="removeHeader(i); (false)"
            >
            <i class="fa fa-trash-o" aria-hidden="true"></i>
          </a>
        </div>
      </div>
    }
    <a
      href="#"
      (click)="addHeader(); (false)"
      class="no-sortjs list-group-item text-center"
      >
      <i class="fa fa-plus" aria-hidden="true"></i>
      {{ "action.add" | translate }}
    </a>
  </div>
</div>
