<div class="form-group row">
  <label class="col-md-3 col-form-label">{{
    "action.system.type" | translate
  }}</label>
  <div class="col-md-9">
    <select class="custom-select" [(ngModel)]="action.transportActionType">
      <option *ngFor="let type of typeList" value="{{ type }}">
        {{ "action.transport.type-enum." + type | translate }}
      </option>
    </select>
  </div>
</div>

<div class="form-group row">
  <label class="col-lg-3 col-form-label">{{
    "action.transport.composition-name" | translate
  }}</label>
  <div class="col-lg-9">
    <input
      [(ngModel)]="action.compositionName"
      [typeahead]="compositionList"
      class="form-control"
    />
  </div>
</div>
