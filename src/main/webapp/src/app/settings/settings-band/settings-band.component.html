<div class="form-group row">
  <label class="col-lg-3 col-form-label">{{ 'settings.instruments' | translate }}<i
      class="fa fa-question-circle-o text-muted ml-1" style="cursor: help;"
      [popover]="'settings.help.instruments' | translate" triggers="mouseenter:mouseleave" container="body"
      placement="right" aria-hidden="true"></i></label>
  <div class="col-lg-9">
    <div class="list-group" [sortablejs]="settings?.instrumentList" [sortablejsOptions]="{ onMove: sortMove }">
      @for (instrument of settings?.instrumentList; track instrument; let i = $index) {
        <div class="list-group-item">
          <div class="form-group row" style="margin-top: 10px; margin-bottom: -30px;">
            <div class="col d-flex">
              <a class="my-auto ml-auto text-danger" href="#" role="button" (click)="deleteInstrument(i); false">
                <i class="fa fa-trash-o" aria-hidden="true"></i>
              </a>
            </div>
          </div>
          <div class="form-group row mb-0">
            <label class="col-md-3 col-form-label">{{ 'settings.instrument-name' | translate }}</label>
            <div class="col-md-8">
              <input type="text" class="form-control" [(ngModel)]="instrument.name" id="name">
            </div>
          </div>
        </div>
      }
      <a href="#" (click)="addInstrument(); false" class="no-sortjs list-group-item text-center">
        <i class="fa fa-plus" aria-hidden="true"></i> {{ 'settings.instrument-add' | translate }}
      </a>
    </div>
  </div>
</div>
