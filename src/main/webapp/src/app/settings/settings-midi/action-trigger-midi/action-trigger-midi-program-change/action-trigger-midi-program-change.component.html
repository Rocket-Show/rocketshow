<div class="form-group row">
  <label class="col-md-3 col-form-label">{{
    "settings.midi-control-program" | translate
  }}</label>
  <div class="col-md-9">
    <select
      class="custom-select"
      [ngModel]="trigger.program"
      (ngModelChange)="trigger.program = $event"
    >
      <option *ngFor="let program of programList" [ngValue]="program">
        {{ program + 1 }}
      </option>
    </select>
  </div>
</div>
