<div class="alert alert-warning mb-2" role="alert">
  <i class="fa fa-exclamation-triangle" aria-hidden="true"></i>
  {{ "settings.restart-required" | translate }}
</div>

<div *ngIf="settings && !settings?.readyToUseVersion" class="form-group row">
  <label class="col-lg-3 col-form-label">{{
    "settings.midi-device-in" | translate
  }}</label>
  <div class="col-lg-9 d-flex">
    <div class="my-auto" *ngIf="midiInDevices?.length == 0">
      - {{ "settings.no-midi-devices" | translate }} -
    </div>
    <select
      *ngIf="midiInDevices?.length > 0"
      class="custom-select"
      [compareWith]="midiDeviceEqual"
      [(ngModel)]="settings.midiInDevice"
    >
      <option *ngFor="let midiDevice of midiInDevices" [ngValue]="midiDevice">
        {{ midiDevice.name }}
      </option>
    </select>
  </div>
</div>

<div *ngIf="settings && !settings?.readyToUseVersion" class="form-group row">
  <label class="col-lg-3 col-form-label">{{
    "settings.midi-device-out" | translate
  }}</label>
  <div class="col-lg-9 d-flex">
    <div class="my-auto" *ngIf="midiOutDevices?.length == 0">
      - {{ "settings.no-midi-devices" | translate }} -
    </div>
    <select
      *ngIf="midiOutDevices?.length > 0"
      class="custom-select"
      [compareWith]="midiDeviceEqual"
      [(ngModel)]="settings.midiOutDevice"
    >
      <option *ngFor="let midiDevice of midiOutDevices" [ngValue]="midiDevice">
        {{ midiDevice.name }}
      </option>
    </select>
  </div>
</div>

<div class="form-group row">
  <label class="col-lg-3 col-form-label">{{
    "settings.global-play-offset" | translate
  }}</label>
  <div class="col-lg-9">
    <input
      type="text"
      class="form-control"
      [ngModel]="settings?.offsetMillisMidi"
      (ngModelChange)="settings.offsetMillisMidi = $event"
    />
  </div>
</div>

<div class="form-group row">
  <label class="col-lg-3 col-form-label">{{
    "settings.device-in-midi-routing" | translate
  }}</label>
  <div class="col-lg-9">
    <app-midi-routing
      [midiRoutingList]="settings?.deviceInMidiRoutingList"
    ></app-midi-routing>
  </div>
</div>

<div class="form-group row">
  <label class="col-lg-3 col-form-label">{{
    "settings.remote-midi-routing" | translate
  }}</label>
  <div class="col-lg-9">
    <app-midi-routing
      [midiRoutingList]="settings?.remoteMidiRoutingList"
    ></app-midi-routing>
  </div>
</div>

<div class="form-group row">
  <label class="col-lg-3 col-form-label">{{
    "settings.global-midi-mapping" | translate
  }}</label>
  <div class="col-lg-9">
    <div class="card border-secondary">
      <div class="card-body">
        <app-midi-mapping
          [midiMapping]="settings?.midiMapping"
        ></app-midi-mapping>
      </div>
    </div>
  </div>
</div>

<div class="form-group row">
  <label class="col-lg-3 col-form-label">{{
    "settings.midi-control" | translate
  }}</label>
  <div class="col-lg-9">
    <div
      class="list-group"
      [sortablejs]="settings?.actionTriggerMidiList"
      [sortablejsOptions]="{ onMove: sortMove }"
    >
      <div
        class="list-group-item"
        *ngFor="
          let actionTriggerMidi of settings?.actionTriggerMidiList;
          let i = index
        "
      >
        <app-action-trigger
          [index]="i"
          (delete)="deleteActionTrigger($event)"
          [trigger]="actionTriggerMidi"
          (change)="onTriggerChange($event)"
        ></app-action-trigger>
      </div>
      <a
        href="#"
        (click)="addActionTrigger(); (false)"
        class="no-sortjs list-group-item text-center"
      >
        <i class="fa fa-plus" aria-hidden="true"></i>
        {{ "settings.midi-control-add" | translate }}
      </a>
    </div>
  </div>
</div>
