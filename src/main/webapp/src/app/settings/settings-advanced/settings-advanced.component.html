<div class="form-group row">
  <label class="col-sm-3 col-form-label">{{ 'settings.logging-level' | translate }}</label>
  <div class="col-sm-9">
    <select class="custom-select" [ngModel]="settings?.loggingLevel" (ngModelChange)="settings.loggingLevel = $event">
      @for (loggingLevel of loggingLevelList; track loggingLevel) {
      <option [ngValue]="loggingLevel">
        {{ 'settings.logging-level-enum.' + loggingLevel | translate }}</option>
      }
    </select>
  </div>
</div>

@if (operatingSystemInformation?.subType == 'RASPBERRYOS') {
<div class="form-group row">
  <div class="col-lg-3"></div>
  <div class="col-lg-9">
    <a href="#" class="btn btn-primary btn-sm" (click)="factoryReset(); false;">
      <i class="fa fa-home" aria-hidden="true"></i> {{ 'settings.factory-reset' | translate }}</a>
  </div>
</div>
}

<div class="form-group row">
  <div class="col-lg-3"></div>
  <div class="col-lg-9">
    <a href="#" class="btn btn-primary btn-sm" (click)="downloadLogs(); false;">
      <i class="fa fa-download"></i> {{ 'settings.download-logs' | translate }}</a>
  </div>
</div>

<div class="form-group row">
  <div class="col-lg-3"></div>
  <div class="col-lg-9">
    <button type="button" class="btn btn-primary btn-sm" [disabled]="enableMaintenanceModeLoading"
      (click)="enableMaintenanceMode(); false;">
      @if (enableMaintenanceModeLoading) {
      <i class="fa fa-spinner fa-pulse fa-fw"></i>
      }
      @if (!enableMaintenanceModeLoading) {
      <i class="fa fa-terminal"></i>
      }
      {{ 'settings.enable-maintenance-mode' | translate }}
    </button>
  </div>
</div>
