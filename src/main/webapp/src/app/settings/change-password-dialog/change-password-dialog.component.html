<div class="card-modal">
    <div class="card">
        <div class="card-header">
            {{ 'settings.change-pw.title' | translate }}
        </div>

        <div class="card-body">

            <div class="form-group row">
                <label class="col-lg-5 col-form-label">{{ 'settings.change-pw.old-pw' | translate }}</label>
                <div class="col-lg-7 my-auto">
                    <input type="password" class="form-control" [(ngModel)]="oldPw" id="oldPw">
                </div>
            </div>

            <div class="form-group row">
                <label class="col-lg-5 col-form-label">{{ 'settings.change-pw.new-pw' | translate }}</label>
                <div class="col-lg-7 my-auto">
                    <input type="password" class="form-control" [(ngModel)]="newPw" id="newPw">
                </div>
            </div>

            <div class="form-group row mb-0">
                <label class="col-lg-5 col-form-label">{{ 'settings.change-pw.new-pw-repeat' | translate }}</label>
                <div class="col-lg-7 my-auto">
                    <input type="password" class="form-control" [(ngModel)]="newPwRepeat" id="newPwRepeat">
                </div>
            </div>

            <div class="form-group row mb-0 p-3">
                <div *ngIf="error" class="alert alert-danger mt-3 mb-0 w-100">
                    {{ 'settings.change-pw.error' | translate }}
                </div>
            </div>

        </div>

        <div class="card-footer">
            <div class="d-flex float-right">
                <a class="mr-3 my-auto" href="#" role="button" (click)="cancel(); (false)">
                    {{ "misc.cancel" | translate }}
                </a>
                <button type="button"
                    [disabled]="loading || !oldPw || oldPw.length === 0 || !newPw || newPw.length === 0 || newPw != newPwRepeat || newPw.length < 6"
                    class="btn btn-primary" (click)="ok(); false">
                    @if (loading) {<i class="fa fa-spinner fa-pulse fa-fw"></i>}{{ 'misc.ok' | translate }}
                </button>
            </div>
        </div>

    </div>
</div>
