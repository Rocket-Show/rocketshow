<div class="card-modal">
    <div class="card">
        <div class="card-header">
            {{ 'settings.new-api-key.title' | translate }}
        </div>

        <div class="card-body">

            <div class="form-group row">
                <label class="col-lg-4 col-form-label">{{ 'settings.api-key-description' | translate }}</label>
                <div class="col-lg-8 my-auto">
                    <input type="text" class="form-control" [(ngModel)]="apiKey.description" id="description"
                        placeholder="{{ 'settings.api-key-description' | translate }}">
                </div>
            </div>
            <div class="form-group row">
                <label class="col-lg-4 col-form-label">{{ 'settings.new-api-key.key' | translate }}</label>
                <div class="col-lg-8 my-auto">
                    <input disabled type="text" class="form-control" [ngModel]="apiKey.key" id="key">
                </div>
            </div>
            <div class="form-group row p-3 mb-0">
                <div class="col-lg-4"></div>
                <div class="col-lg-8 pr-0">
                    <div class="alert alert-warning mb-0 w-100" role="alert">
                        <i class="fa fa-exclamation-triangle" aria-hidden="true"></i>
                        {{ "settings.new-api-key.warning" | translate }}
                    </div>
                </div>
            </div>

        </div>

        <div class="card-footer">
            <div class="d-flex float-right">
                <a class="mr-3 my-auto" href="#" role="button" (click)="cancel(); (false)">
                    {{ "misc.cancel" | translate }}
                </a>
                <button type="button" [disabled]="!apiKey.description || apiKey.description.length === 0"
                    class="btn btn-primary" (click)="ok(); false">
                    {{ 'misc.ok' | translate }}
                </button>
            </div>
        </div>

    </div>
</div>
