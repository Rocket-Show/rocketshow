<!-- The specific trigger -->
@if (getTriggerType() == 'MIDI') {
  <app-action-trigger-midi
    [trigger]="trigger"
    [index]="index"
    (triggerChange)="onTriggerChange($event)"
  ></app-action-trigger-midi>
}

@if (getTriggerType() == 'COMPOSITION') {
  <app-action-trigger-composition
    [trigger]="trigger"
  ></app-action-trigger-composition>
}

@if (getTriggerType() == 'RASPBERRY_GPIO') {
  <app-action-trigger-raspberry-gpio
    [trigger]="trigger"
  ></app-action-trigger-raspberry-gpio>
}

<!-- Action list -->
<app-action-list [actionList]="trigger.actionList"></app-action-list>

<!-- Move/delete -->
@if (listHandle) {
  <div class="form-group row">
    <div class="col-md-12 d-flex">
      <div
        class="flex-grow-1 list-sort-handle my-auto"
        style="cursor: move; cursor: -webkit-grabbing"
        >
        <i class="fa fa-bars" aria-hidden="true"></i>
      </div>
      <div class="ml-auto">
        <a
          class="mr-3 my-auto text-danger"
          href="#"
          role="button"
          (click)="delete.next(index); (false)"
          >
          <i class="fa fa-trash-o" aria-hidden="true"></i>
          {{ "misc.delete" | translate }}
        </a>
      </div>
    </div>
  </div>
}
