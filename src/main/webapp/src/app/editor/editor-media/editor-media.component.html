<div class="row">

  <!-- Upload -->
  <div class="col-md-6 mb-3">
    <div class="card border-secondary h-100">
      <div class="card-header">
        <i class="fa fa-upload" aria-hidden="true"></i>
        {{ "editor.upload" | translate }}
      </div>
      <div class="card-body">
        <!-- Disk space -->
        <div class="row d-flex mb-3">
          <div class="col col-auto my-auto pr-0">
            <small>{{ diskSpaceUsedGB }} GB / {{ diskSpaceAvailableGB }} GB
              ({{ diskSpacePercentage }} %)</small>
          </div>
          <div class="col my-auto">
            <div class="progress m-0">
              <div class="progress-bar progress-bar-striped" role="progressbar"
                [style.width]="diskSpacePercentage + '%'" aria-valuenow="10" aria-valuemin="0"
                aria-valuemax="100"></div>
            </div>
          </div>
        </div>

        <app-file-dropzone [url]="'file/upload'" [acceptedFiles]="'audio/*,video/*'"
          (error)="onUploadError($event)" (success)="onUploadSuccess($event)"></app-file-dropzone>
      </div>
    </div>
  </div>

  <!-- Media library -->
  <div class="col-md-6 mb-3">
    <div class="card border-secondary h-100">
      <div class="card-header">
        <i class="fa fa-folder-o" aria-hidden="true"></i>
        {{ "editor.media-library" | translate }}
      </div>
      <div class="card-body">
        <input type="text" class="form-control input-block mb-3" id="searchMediaFiles"
          placeholder="{{ 'editor.search-files' | translate }}"
          (input)="filterFiles($event.target.value)" />

        <div class="card border-secondary" style="height: 400px; overflow-y: scroll">
          <div class="card-body p-0">
            <div class="list-group list-group-flush">
              @for (file of filteredExistingFiles | sort : 'name'; track file) {
              <div class="list-group-item">
                <div class="row">
                  <div class="col-auto my-auto">
                    <i class="fa fa-fw" [ngClass]="file.getFontAwesomeIconClass()" aria-hidden="true"></i>
                  </div>
                  <div class="col my-auto text-break-word pl-0">
                    {{ file.name }}
                  </div>
                  <div class="col-auto my-auto pl-0 text-danger" style="cursor: pointer"
                    (click)="deleteFile(file)">
                    <i class="fa fa-trash-o" aria-hidden="true"></i>
                  </div>
                </div>
              </div>
              }
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>
