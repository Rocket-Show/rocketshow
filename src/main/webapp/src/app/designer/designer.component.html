<!--
Enable when @rocketshow/designer exposes these inputs:
<lib-designer
    [universes]="designerUniverses"
    [freeUniverseEdit]="false">
</lib-designer>
-->
<lib-designer
    [menuHeightPx]="73.375"
    [externalCompositionsAvailable]="true"
    [restUrl]="appHttpInterceptor.getRestUrl()"
    [enableMediaLibrary]="true"
    [livePreview]="settingsService.settings?.designerLivePreview || false"
    [localProfiles]="true"
    [uniqueProjectNames]="true"
>
</lib-designer>
